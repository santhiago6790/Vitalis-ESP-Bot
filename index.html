<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Vitalis EPS | Asistente IA de Salud</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #eef5ff, #dce6f5);
      overflow-x: hidden;
    }

    #particlesCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .main-content { position: relative; z-index: 2; }

    .navbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:1rem 2rem;
      margin:1.5rem;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
    }

    .logo {
      font-size: 1.8rem;
      font-weight:700;
      background: linear-gradient(120deg,#0F4C5C,#2AA9A9);
      -webkit-background-clip:text;
      color:transparent;
    }

    .nav-links {
      display:flex;
      gap:1.5rem;
    }

    .nav-links a {
      text-decoration:none;
      color:#0a2b3e;
    }

    .hero {
      padding:4rem 2rem;
      text-align:center;
    }

    .hero h1 {
      font-size:3.5rem;
    }

    .gradient-text {
      background: linear-gradient(135deg,#1A6B5E,#2D9CDB);
      -webkit-background-clip:text;
      color:transparent;
    }

    section {
      margin:3rem 2rem;
      padding:2rem;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
    }

    .section-title {
      text-align:center;
      font-size:2rem;
      margin-bottom:2rem;
    }

    .services-grid,
    .specialties-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap:1rem;
    }

    .service-card,
    .specialty-card {
      padding:1rem;
      border-radius:1.5rem;
      background: rgba(255,255,240,0.4);
      text-align:center;
      cursor:pointer;
      transition:.2s;
    }

    .service-card:hover,
    .specialty-card:hover {
      transform: translateY(-3px);
    }

    input, select, textarea {
      padding:0.8rem;
      border:none;
      border-radius:2rem;
      background: rgba(255,255,255,0.7);
      outline:none;
    }

    button {
      cursor:pointer;
      border:none;
    }

    /* CHAT */
    .chat-toggle {
      position:fixed;
      bottom:18px;
      right:18px;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#1E8F8F;
      color:white;
      z-index:1001;
    }

    .chat-window {
      position:fixed;
      bottom:85px;
      right:12px;
      width:380px;
      height:560px;
      border-radius:24px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      background: rgba(5,15,35,0.96);
      transform:scale(0);
      opacity:0;
      transition:.2s;
      z-index:1000;
    }

    .chat-window.open {
      transform:scale(1);
      opacity:1;
    }

    .chat-header {
      padding:16px;
      background: rgba(0,0,0,0.5);
      color:white;
      display:flex;
      justify-content:space-between;
    }

    .chat-body {
      flex:1;
      overflow-y:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .message {
      max-width:85%;
      padding:0.7rem 1rem;
      border-radius:1rem;
      font-size:0.85rem;
    }

    .user {
      align-self:flex-end;
      background:#2C7DA0;
      color:white;
    }

    .bot {
      align-self:flex-start;
      background:rgba(255,255,255,0.1);
      color:white;
    }

    .typing {
      opacity:0.6;
      font-style:italic;
    }

    .chat-input-container {
      display:flex;
      gap:10px;
      padding:12px;
      background:#111827;
    }

    .chat-input {
      flex:1;
      padding:0.8rem;
      border-radius:2rem;
      border:none;
      outline:none;
    }

    .send-btn {
      width:45px;
      height:45px;
      border-radius:50%;
      background:#1E8F8F;
      color:white;
    }

    @media(max-width:768px){
      .chat-window {
        width:90%;
        height:520px;
      }
    }
  </style>
</head>

<body>

<canvas id="particlesCanvas"></canvas>

<div class="main-content">

  <nav class="navbar">
    <div class="logo">VITALIS EPS</div>
    <div class="nav-links">
      <a href="#inicio">Inicio</a>
      <a href="#servicios">Servicios</a>
      <a href="#especialidades">Especialidades</a>
      <a href="#citas">Citas</a>
      <a href="#pqrs">PQRS</a>
    </div>
  </nav>

  <div class="hero" id="inicio">
    <h1>Salud <span class="gradient-text">Inteligente</span></h1>
    <p>IA médica + atención digital + gestión inteligente</p>
  </div>

  <section id="servicios">
    <h2 class="section-title">Servicios</h2>
    <div class="services-grid" id="servicesGrid"></div>
  </section>

  <section id="especialidades">
    <h2 class="section-title">Especialidades</h2>
    <div class="specialties-grid" id="specialtiesGrid"></div>
  </section>

  <section id="citas">
    <h2 class="section-title">Agendar cita</h2>
    <input id="citaNombre" placeholder="Nombre">
    <input id="citaDoc" placeholder="Documento">
    <select id="citaServicio"></select>
    <input type="date" id="citaFecha">
    <button id="btnCita">Agendar</button>
    <div id="citaMsg"></div>
  </section>

  <section id="pqrs">
    <h2 class="section-title">PQRS</h2>
    <input id="pqrsNombre" placeholder="Nombre">
    <textarea id="pqrsMotivo"></textarea>
    <button id="btnPQRS">Enviar</button>
  </section>

</div>

<!-- CHAT -->
<button class="chat-toggle" id="chatToggle">💬</button>

<div class="chat-window" id="chatWindow">

  <div class="chat-header">
    <span>Vitalis AI</span>
    <span id="closeChat">✖</span>
  </div>

  <div class="chat-body" id="chatMessages">
    <div class="message bot">Hola 👋 soy Vitalis IA</div>
  </div>

  <div class="chat-input-container">
    <input class="chat-input" id="chatInput">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>

</div>

<script>
const API_URL = "http://localhost:3000/chat";

/* CHAT */
const chatWindow = document.getElementById("chatWindow");
const chatToggle = document.getElementById("chatToggle");
const closeChat = document.getElementById("closeChat");
const chatInput = document.getElementById("chatInput");
const chatMessages = document.getElementById("chatMessages");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function askAI(msg){
  try {
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data = await res.json().catch(()=>({}));
    return data.reply || "Sin respuesta del servidor";
  } catch(e){
    return "Error de conexión";
  }
}

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text) return;

  addMessage(text,"user");
  chatInput.value="";

  const typing = document.createElement("div");
  typing.className="message bot typing";
  typing.innerText="Escribiendo...";
  chatMessages.appendChild(typing);

  const reply = await askAI(text);

  typing.remove();
  addMessage(reply,"bot");
}

sendBtn.onclick = sendMessage;

chatInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") sendMessage();
});

chatToggle.onclick = ()=> chatWindow.classList.toggle("open");
closeChat.onclick = ()=> chatWindow.classList.remove("open");

/* SERVICIOS */
const servicios = ["Consulta","Odontología","Pediatría","Cardiología","Dermatología"];
const especialidades = ["Cardio","Neuro","Dermato","Pediatría"];

const grid = document.getElementById("servicesGrid");
grid.innerHTML = servicios.map(s=>`<div class="service-card">${s}</div>`).join("");

document.getElementById("specialtiesGrid").innerHTML =
especialidades.map(s=>`<div class="specialty-card">${s}</div>`).join("");

document.getElementById("citaServicio").innerHTML =
servicios.map(s=>`<option>${s}</option>`).join("");

document.getElementById("btnCita").onclick = ()=>{
  addMessage("Cita agendada ✔","bot");
};

document.getElementById("btnPQRS").onclick = ()=>{
  addMessage("PQRS enviada ✔","bot");
};

/* PARTICULAS SIMPLE */
const canvas=document.getElementById("particlesCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];
for(let i=0;i<50;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(80,180,220,0.3)";
  p.forEach(pt=>{
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
    ctx.fill();
    pt.x+=0.3;
    pt.y+=0.2;
    if(pt.x>canvas.width) pt.x=0;
    if(pt.y>canvas.height) pt.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
